# =============================================================================
# Chapel Attendance System — Nginx Configuration
#
# What this file does:
#   1. Redirects all HTTP traffic to HTTPS
#   2. Terminates SSL using Let's Encrypt certificates
#   3. Proxies /api/* and /media/* to the Django backend (port 8000)
#   4. BLOCKS /media/face_samples/ — biometric data, never publicly served
#   5. Restricts /admin/ to your IP address only
#   6. Proxies everything else to the Next.js frontend (port 3000)
#   7. Sets security response headers
#
# BEFORE USING:
#   Replace YOUR_DOMAIN with your actual domain (e.g. chapel.youruniversity.edu)
#   Replace YOUR_ADMIN_IP with your own IP address (run: curl ifconfig.me)
#   Replace the SSL cert paths if your domain differs
# =============================================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Upload size — must accommodate face image uploads (max 5 MB) ─────────
    client_max_body_size 10m;

    # =========================================================================
    # /sysadmin/ — Django admin panel
    # Restricted to your IP address only. Anyone else gets 403.
    # To find your IP: curl ifconfig.me
    # =========================================================================
    location /sysadmin/ {
        allow YOUR_ADMIN_IP;
        deny all;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # SECURITY: Block direct access to face sample images.
    # Face biometric data must never be publicly downloadable.
    # Profile photos (/media/profile_photos/) are served normally below.
    # =========================================================================
    location /media/face_samples/ {
        return 403 "Access denied.";
    }

    # ── Media files (profile photos, etc.) ───────────────────────────────────
    location /media/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Static files (Django collectstatic) ──────────────────────────────────
    location /static/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Django API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # Allow time for face processing
    }

    # ── Next.js frontend (everything else) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";  # Needed for Next.js HMR / WebSocket
    }
}
